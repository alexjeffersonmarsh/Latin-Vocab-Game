<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vocabulary Setup</title>

  <link.css
</head>

<body>

  <div class="inputArea">
    <h2>Teacher Setup</h2>

    <p>Enter vocabulary as: <strong>word,definition</strong></p>

    <input
      id="listName"
      placeholder="List name (e.g. test)"
      style="width:100%; padding:10px; margin-bottom:10px;"
    >

    <textarea id="vocabInput" rows="12"></textarea>

    <button onclick="saveVocabulary()">Save Vocabulary</button>

    <div id="linkArea" style="display:none; margin-top:15px;">
      <p><strong>Student Link:</strong></p>
      <input id="studentLink" readonly style="width:100%; padding:10px;">
      <button onclick="copyLink()">Copy Link</button>
    </div>

  </div>

  <script>
    function saveVocabulary() {
      const name = document.getElementById("listName").value.trim();
      const vocab = document.getElementById("vocabInput").value.trim();

      if (!name || !vocab) {
        alert("Please enter both name and vocab.");
        return;
      }

      localStorage.setItem("vocab_" + name, vocab);

      const base = window.location.origin + window.location.pathname.replace("setup.html","game.html");
      const link = base + "?list=" + encodeURIComponent(name);

      document.getElementById("studentLink").value = link;
      document.getElementById("linkArea").style.display = "block";
    }

    function copyLink() {
      const input = document.getElementById("studentLink");
      input.select();
      navigator.clipboard.writeText(input.value);
      alert("Link copied!");
    }
  </script>

</body>
</html>
