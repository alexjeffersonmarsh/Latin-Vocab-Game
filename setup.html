
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vocabulary Game – Teacher Setup</title>

  <!-- Shared game styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="inputArea">
    <h2>Teacher Setup</h2>
    <p>Enter vocabulary using the format:</p>
    <p><strong>WORD,DEFINITION</strong> (one pair per line)</p>

    <!-- Vocabulary list name -->
    <input
      id="listName"
      type="text"
      placeholder="List name (e.g. latin1, review, honors)"
      style="width: 100%; padding: 10px; margin-bottom: 12px;"
    >

    <!-- Vocabulary input -->
    <textarea id="vocabInput" rows="12">
amicus,friend
bellum,war
aqua,water
ignis,fire
terra,earth
luna,moon
sol,sun
mare,sea
via,road
puer,boy
puella,girl
rex,king
regina,queen
domus,house
urbs,city
navis,ship
    </textarea>

    <button onclick="saveVocabulary()">Save Vocabulary</button>

    <!-- ✅ NEW: Link output area -->
    <div id="linkArea" style="display:none; margin-top:15px;">
      <p><strong>Student Game Link:</strong></p>

      <input
        id="studentLink"
        type="text"
        readonly
        style="width: 100%; padding: 10px; font-size: 14px;"
      >

      <button onclick="copyLink()" style="margin-top:8px;">
        Copy Link
      </button>

      <p id="copyStatus" style="margin-top:6px; font-weight:bold;"></p>
    </div>
  </div>

  <script>
    function saveVocabulary() {
      const vocabText = document.getElementById("vocabInput").value.trim();
      const listName = document.getElementById("listName").value.trim();

      if (!vocabText || !listName) {
        alert("Please enter BOTH a list name and vocabulary.");
        return;
      }

      // Save vocab list under a unique key
      localStorage.setItem("vocab_" + listName, vocabText);

      // Build the student link (auto-encoded safely)
      const baseURL = window.location.origin + window.location.pathname.replace("setup.html", "game.html");
      const link = baseURL + "?list=" + encodeURIComponent(listName);

      // Show link on page
      document.getElementById("studentLink").value = link;
      document.getElementById("linkArea").style.display = "block";
      document.getElementById("copyStatus").textContent = "";
    }

    function copyLink() {
      const input = document.getElementById("studentLink");
      input.select();
      input.setSelectionRange(0, 99999); // mobile support

      navigator.clipboard.writeText(input.value).then(() => {
        document.getElementById("copyStatus").textContent = "✅ Link copied to clipboard!";
      });
    }
  </script>

</body>
</html>
