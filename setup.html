<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Setup - Vocab Gems</title>
    <!-- Ensure this matches your CSS filename -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Forces the stonework background even if style.css isn't loading */
        body {
            background-color: #1a1a1d;
            background-image:
                linear-gradient(315deg, rgba(0,0,0,0.15) 25%, transparent 25%),
                linear-gradient(45deg, rgba(0,0,0,0.15) 25%, transparent 25%),
                linear-gradient(225deg, rgba(0,0,0,0.15) 25%, transparent 25%),
                linear-gradient(135deg, rgba(0,0,0,0.15) 25%, transparent 25%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 0, 30px 30px, 0 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #e0e0e0;
        }

        .setup-card {
            width: 100%;
            max-width: 600px;
            background: rgba(45, 45, 50, 0.95);
            border: 3px solid #444;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 20px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #f1c40f;
            margin-top: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .instruction {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        input[type="text"], textarea {
            width: 100%;
            background: #121214;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            padding: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #f1c40f;
        }

        button.main-btn {
            background: linear-gradient(to bottom, #444, #222);
            border: 2px solid #555;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            transition: all 0.2s;
        }

        button.main-btn:hover {
            background: linear-gradient(to bottom, #555, #333);
            border-color: #f1c40f;
            transform: translateY(-2px);
        }

        .link-result {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            border: 1px solid #f1c40f;
        }

        #studentLink {
            background: #000;
            color: #27ae60;
            font-family: monospace;
            border: 1px solid #222;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="setup-card">
        <h2>Teacher Portal</h2>
        <p class="instruction">Create a new gem-matching vocabulary list.</p>

        <input 
            type="text" 
            id="listName" 
            placeholder="List Name (e.g., French-Gems-1)"
            autocomplete="off"
        >

        <textarea 
            id="vocabInput" 
            rows="8" 
            placeholder="word,definition&#10;example,this is an example&#10;gem,a shiny stone"
        ></textarea>

        <button class="main-btn" onclick="saveVocabulary()">Assemble Game</button>

        <div id="linkArea" class="link-result" style="display:none;">
            <p style="margin-top:0; font-weight:bold; color:#f1c40f;">Student Game Link:</p>
            <input id="studentLink" readonly>
            <button class="main-btn" onclick="copyLink()" style="margin-top:10px; padding:10px; font-size:12px;">Copy to Clipboard</button>
        </div>
    </div>

    <script>
        function saveVocabulary() {
            const name = document.getElementById("listName").value.trim().replace(/\s+/g, '-');
            const vocab = document.getElementById("vocabInput").value.trim();

            if (!name || !vocab) {
                alert("Please name the list and provide vocabulary pairs.");
                return;
            }

            // Store in LocalStorage
            localStorage.setItem("vocab_" + name, vocab);

            // Generate Link
            const currentPath = window.location.pathname;
            const dir = currentPath.substring(0, currentPath.lastIndexOf('/'));
            const base = window.location.origin + dir + "/game.html";
            const link = base + "?list=" + encodeURIComponent(name);

            document.getElementById("studentLink").value = link;
            document.getElementById("linkArea").style.display = "block";
        }

        function copyLink() {
            const input = document.getElementById("studentLink");
            input.select();
            navigator.clipboard.writeText(input.value);
            alert("Link copied! Share this with your students.");
        }
    </script>

</body>
</html>
