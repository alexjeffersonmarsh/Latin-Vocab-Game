<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocabulary Jewel Game</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===== HUD ===== -->
<div class="stats-hud">

    <div class="stat-item">
        SCORE:
        <span id="score">0</span>
    </div>

    <div class="stat-item">
        TIME:
        <span id="timer">180</span>
    </div>

</div>

<!-- ===== GAME AREA ===== -->
<div id="game-container">

    <div class="board-column">
        <h3>Words</h3>
        <div id="gemGrid"></div>
    </div>

    <div class="board-column">
        <h3>Definitions</h3>
        <div id="cardGrid"></div>
    </div>

</div>

<!-- =========================================
     FIREBASE LOADER (FIXED)
========================================= -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    doc,
    getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-goTprU8NMVqmsAlve6BAfXrPZN-sQdQ",
  authDomain: "bubbleword-30367.firebaseapp.com",
  projectId: "bubbleword-30367"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ✅ FIXED loader
async function loadSet(setId) {

    const ref = doc(db, "vocabSets", setId);
    const snapshot = await getDoc(ref);

    if (!snapshot.exists()) {
        alert("Vocabulary set not found.");
        return [];
    }

    let terms = snapshot.data().terms;

    // ✅ CRITICAL FIX: handle string storage
    if (typeof terms === "string") {
        try {
            terms = JSON.parse(terms);
        } catch (e) {
            console.error("Parse error:", e);
            terms = [];
        }
    }

    return terms;
}

// ✅ URL param
const params = new URLSearchParams(window.location.search);
const setId = params.get("id");

if (setId) {

    loadSet(setId).then(data => {

        // ✅ Convert to game format
        window.preloadedVocab = data.map(v => ({
            word: v.word,
            definition: v.meaning
        }));

        console.log("GemWord vocab loaded:", window.preloadedVocab);

    }).catch(err => {
        console.error(err);
        alert("Could not load vocabulary set.");
    });

}

</script>

<!-- =========================================
     GAME SCRIPT
========================================= -->

<script src="script.js"></script>

</body>
</html>
