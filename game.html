<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Vocabulary Jewel Game</title>

    <!-- STYLES -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===== FIXED HUD ===== -->
    <div class="stats-hud">

        <div class="stat-item">
            SCORE:
            <span id="score">0</span>
        </div>

        <div class="stat-item">
            TIME:
            <span id="timer">180</span>
        </div>

    </div>

    <!-- ===== MAIN GAME ===== -->
    <div id="game-container">

        <!-- LEFT SIDE -->
        <div class="board-column">

            <h3>Words</h3>

            <div id="gemGrid"></div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="board-column">

            <h3>Definitions</h3>

            <div id="cardGrid"></div>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script src="script.js"></script>

</body>

</html>
