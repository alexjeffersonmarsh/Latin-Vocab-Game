
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vocabulary Jewel Game</title>

  <!-- ✅ Load CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ✅ TOP BAR -->
  <div class="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="timer">180</span>s</div>
  </div>

  <!-- ✅ GAME AREA -->
  <div class="game">

    <!-- WORD SIDE -->
    <div>
      <h3>Words</h3>
      <div id="gemGrid" class="grid"></div>
    </div>

    <!-- DEFINITION SIDE -->
    <div>
      <h3>Definitions</h3>
      <div id="cardGrid" class="cards"></div>
    </div>

  </div>

  <!-- ✅ CRITICAL: Load JavaScript correctly -->
  <script src="script.js"></script>

</body>
</html>
