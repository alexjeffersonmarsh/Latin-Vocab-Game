
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vocabulary Jewel Game</title>

  <!-- Game styles -->
  <link rel="stylesheet" href="style.css">

  <!-- Game logic -->
  <script src="script.js" defer></script>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="timer">180</span>s</div>
  </div>

  <!-- GAME AREA -->
  <div class="game">
    <!-- JEWEL BOARD -->
    <div>
      <h3>Words</h3>
      <div id="gemGrid" class="grid"></div>
    </div>

    <!-- DEFINITION CARDS -->
    <div>
      <h3>Definitions</h3>
      <div id="cardGrid" class="cards"></div>
    </div>
  </div>

</body>
</html>
