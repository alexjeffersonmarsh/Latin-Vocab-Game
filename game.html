<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Jewel Game</title>
    
    <!-- ✅ FIX 1: The proper way to link your CSS file -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="timer">180</span>s</div>
    </div>

    <div id="game-container">
        <div class="board-column">
            <h3>Words</h3>
            <!-- This ID MUST match the one in script.js -->
            <div id="gemGrid"></div>
        </div>

        <div class="board-column">
            <h3>Definitions</h3>
            <!-- This ID MUST match the one in script.js -->
            <div id="cardGrid"></div>
        </div>
    </div>

    <!-- ✅ FIX 2: The proper way to load your JavaScript -->
    <!-- This must be at the bottom, just before the closing body tag -->
    <script src="script.js"></script>

</body>
</html>
