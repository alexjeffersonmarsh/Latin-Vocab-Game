
<!DOCTYPE html>
<html>
<head>
  <title>Vocabulary Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="topbar">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="timer">180</span>s</div>
  </div>

  <div class="game">

    <div>
      <h3>Words</h3>
      <div id="gemGrid" class="grid"></div>
    </div>

    <div>
      <h3>Definitions</h3>
      <div id="cardGrid" class="cards"></div>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
